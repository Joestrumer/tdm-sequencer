<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terre de Mars — Espace Partenaire</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e293b'/><text x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='13' fill='white'>TM</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #0f172a; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const API_BASE = window.location.origin + '/api/partenaire';

    window.partnerApi = {
      _headers: () => {
        const token = sessionStorage.getItem('partner_token') || '';
        return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
      },
      get: (path) => fetch(API_BASE + path, { headers: window.partnerApi._headers() }).then(r => r.json()),
      post: (path, body) => fetch(API_BASE + path, { method: 'POST', headers: window.partnerApi._headers(), body: JSON.stringify(body) }).then(r => r.json()),
      patch: (path, body) => fetch(API_BASE + path, { method: 'PATCH', headers: window.partnerApi._headers(), body: JSON.stringify(body) }).then(r => r.json()),
      del: (path) => fetch(API_BASE + path, { method: 'DELETE', headers: window.partnerApi._headers() }).then(r => r.json()),
    };
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;
    const api = window.partnerApi;

    // ─── Toast ──────────────────────────────────────────────────────────────────
    const Toast = ({ toast }) => {
      if (!toast || !toast.visible) return null;
      const colors = { success: "bg-emerald-600", error: "bg-red-500", info: "bg-slate-700" };
      return (
        <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium animate-fade-in ${colors[toast.type] || colors.info}`}>
          {toast.type === "success" && "✓ "}{toast.type === "error" && "✗ "}{toast.message}
        </div>
      );
    };

    // ─── Login Screen ───────────────────────────────────────────────────────────
    const LoginScreen = ({ onLogin }) => {
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleLogin = async () => {
        if (!password.trim()) return;
        setLoading(true);
        setError("");
        try {
          const res = await api.post('/login', { password: password.trim() });
          if (res.erreur) {
            setError(res.erreur);
          } else if (res.token) {
            sessionStorage.setItem('partner_token', res.token);
            onLogin(res.partenaire);
          }
        } catch (e) {
          setError("Impossible de contacter le serveur");
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm animate-fade-in">
            <div className="flex items-center gap-3 mb-8">
              <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-white text-sm font-bold">TM</div>
              <div>
                <div className="text-sm font-semibold text-slate-900">Terre de Mars</div>
                <div className="text-xs text-slate-400">Espace Partenaire</div>
              </div>
            </div>
            <h2 className="text-lg font-semibold text-slate-900 mb-1">Bienvenue</h2>
            <p className="text-sm text-slate-400 mb-6">Entrez votre mot de passe pour accéder au catalogue.</p>
            <input
              type="password"
              value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleLogin()}
              placeholder="Mot de passe..."
              className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-400"
              autoFocus
            />
            {error && <p className="text-red-500 text-xs mt-2">{error}</p>}
            <button
              onClick={handleLogin}
              disabled={loading}
              className="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl text-sm font-medium hover:bg-slate-700 transition-colors disabled:opacity-50"
            >
              {loading ? "Connexion..." : "Accéder"}
            </button>
          </div>
        </div>
      );
    };

    // ─── Constantes amenities ─────────────────────────────────────────────────
    const AMENITY_TYPES = [
      { key: 'gel_douche', label: 'Gel douche', gammes: [
        { ref: 'P008', gamme: 'Verveine / Reddition' },
        { ref: 'P035', gamme: 'Thé Blanc / Élégance' },
      ]},
      { key: 'shampoing', label: 'Shampoing', gammes: [
        { ref: 'P019', gamme: 'Verveine / Reddition' },
        { ref: 'P010', gamme: 'Cédrat / Irrévérence' },
        { ref: 'P034', gamme: 'Thé Blanc / Élégance' },
      ]},
      { key: 'gel_corps_cheveux', label: 'Gel Corps & Cheveux', gammes: [
        { ref: 'P042', gamme: 'Verveine / Reddition' },
        { ref: 'P014', gamme: 'Cédrat / Irrévérence' },
        { ref: 'P040', gamme: 'Thé Blanc / Élégance' },
      ]},
      { key: 'apres_shampoing', label: 'Après-shampoing', gammes: [
        { ref: 'P024', gamme: 'Cédrat / Irrévérence' },
        { ref: 'P037', gamme: 'Thé Blanc / Élégance' },
      ]},
      { key: 'lotion', label: 'Lotion Corps & Main', gammes: [
        { ref: 'P036', gamme: 'Thé Blanc / Élégance' },
        { ref: 'P011', gamme: 'Vétiver / Imminence' },
      ]},
      { key: 'savon_main', label: 'Savon Liquide Main', gammes: [
        { ref: 'P007', gamme: 'Vétiver / Insurrection' },
      ]},
    ];

    // ─── Section Amenities (produits en chambre) ──────────────────────────────
    const AmenitiesSection = ({ amenities, catalogue, panier, setPanier }) => {
      if (!amenities || Object.keys(amenities).length === 0) return null;

      // Pour chaque type configuré, trouver les produits catalogue qui matchent la ref de base
      const sections = AMENITY_TYPES
        .filter(type => amenities[type.key])
        .map(type => {
          const baseRef = amenities[type.key];
          const gammeInfo = type.gammes.find(g => g.ref === baseRef);
          const products = catalogue.filter(p => p.ref === baseRef || p.ref.startsWith(baseRef + '-'));
          return { type, baseRef, gammeInfo, products };
        })
        .filter(s => s.products.length > 0);

      if (sections.length === 0) return null;

      const getQty = (ref) => panier[ref]?.quantite || 0;

      const addCarton = (ref) => {
        const prod = catalogue.find(c => c.ref === ref);
        const moq = prod.moq || 1;
        setPanier(p => ({ ...p, [ref]: { ...prod, quantite: getQty(ref) + moq } }));
      };

      const removeCarton = (ref) => {
        const prod = catalogue.find(c => c.ref === ref);
        const moq = prod.moq || 1;
        const next = getQty(ref) - moq;
        if (next <= 0) {
          setPanier(p => { const n = { ...p }; delete n[ref]; return n; });
        } else {
          setPanier(p => ({ ...p, [ref]: { ...prod, quantite: next } }));
        }
      };

      return (
        <div className="mb-8">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-1 h-5 bg-emerald-500 rounded-full"></div>
            <h3 className="text-sm font-semibold text-white">Vos produits en chambre</h3>
          </div>
          <div className="space-y-4">
            {sections.map(({ type, gammeInfo, products }) => (
              <div key={type.key}>
                <div className="text-xs text-slate-400 mb-2">{type.label} — <span className="text-emerald-400">{gammeInfo?.gamme || ''}</span></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                  {products.map(p => {
                    const moq = p.moq || 1;
                    const qty = getQty(p.ref);
                    const cartons = moq > 1 ? Math.floor(qty / moq) : qty;
                    return (
                      <div key={p.ref} className="bg-emerald-500/5 border border-emerald-500/20 rounded-xl p-4 hover:bg-emerald-500/10 transition-colors">
                        <div className="text-xs text-slate-400 font-mono mb-1">{p.ref}</div>
                        <div className="text-sm font-medium text-white mb-2 leading-snug">{p.nom}</div>
                        <div className="flex items-end justify-between">
                          <div>
                            {p.discount_pct > 0 && (
                              <div className="text-xs text-slate-500 line-through">{p.prix_ht.toFixed(2)} &euro; HT</div>
                            )}
                            <div className="text-base font-semibold text-emerald-400">{p.prix_remise.toFixed(2)} &euro; <span className="text-xs font-normal text-slate-400">HT/u</span></div>
                            {p.discount_pct > 0 && (
                              <div className="text-xs text-emerald-400/70">-{p.discount_pct}%</div>
                            )}
                            {moq > 1 && (
                              <div className="text-[10px] text-slate-400 mt-0.5">Carton de {moq} u.</div>
                            )}
                          </div>
                          <div className="flex items-center gap-2">
                            {qty > 0 && (
                              <button onClick={() => removeCarton(p.ref)} className="w-7 h-7 rounded-lg bg-white/10 text-white hover:bg-white/20 flex items-center justify-center text-sm font-bold transition-colors">-</button>
                            )}
                            {qty > 0 && (
                              <div className="text-center">
                                <div className="text-white font-semibold text-sm">{moq > 1 ? cartons : qty}</div>
                                {moq > 1 && <div className="text-[9px] text-slate-500">{qty} u.</div>}
                              </div>
                            )}
                            <button onClick={() => addCarton(p.ref)} className="w-7 h-7 rounded-lg bg-emerald-500 text-white hover:bg-emerald-400 flex items-center justify-center text-sm font-bold transition-colors">+</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Section Dernière Commande ────────────────────────────────────────────
    const DerniereCommandeSection = ({ commandes, catalogue, setPanier, setPanierOpen, showToast }) => {
      const [open, setOpen] = useState(false);
      if (!commandes || commandes.length === 0) return null;

      const derniere = commandes[0]; // commandes triées par date desc

      const handleRecommander = () => {
        const newPanier = {};
        derniere.products.forEach(p => {
          const prod = catalogue.find(c => c.ref === p.ref);
          if (prod) {
            newPanier[p.ref] = { ...prod, quantite: p.quantite };
          }
        });
        setPanier(newPanier);
        setPanierOpen(true);
        showToast('Panier rempli avec votre dernière commande', 'success');
      };

      const statutConfig = {
        en_attente: { label: "En attente", bg: "bg-amber-500/20", text: "text-amber-400" },
        validee: { label: "Validée", bg: "bg-emerald-500/20", text: "text-emerald-400" },
        annulee: { label: "Annulée", bg: "bg-red-500/20", text: "text-red-400" },
      };
      const cfg = statutConfig[derniere.statut] || statutConfig.en_attente;

      return (
        <div className="mb-8">
          <button
            onClick={() => setOpen(!open)}
            className="flex items-center gap-2 mb-3 group"
          >
            <div className="w-1 h-5 bg-blue-500 rounded-full"></div>
            <h3 className="text-sm font-semibold text-white">Votre dernière commande</h3>
            <span className="text-slate-500 text-xs group-hover:text-slate-300 transition-colors">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="bg-white/5 border border-white/10 rounded-xl p-4 animate-fade-in">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs text-slate-400">
                  {new Date(derniere.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}
                </div>
                <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${cfg.bg} ${cfg.text}`}>{cfg.label}</span>
              </div>
              <div className="space-y-1 mb-3">
                {derniere.products.map((p, i) => (
                  <div key={i} className="flex justify-between text-sm">
                    <span className="text-slate-300">{p.quantite}x {p.nom || p.ref}</span>
                    <span className="text-white">{p.total_ht.toFixed(2)} &euro;</span>
                  </div>
                ))}
              </div>
              <div className="flex items-center justify-between border-t border-white/10 pt-3">
                <div className="text-sm font-medium text-white">Total: {derniere.total_ht.toFixed(2)} &euro; HT</div>
                <button
                  onClick={handleRecommander}
                  className="px-4 py-2 bg-blue-500 text-white text-xs font-medium rounded-lg hover:bg-blue-400 transition-colors"
                >
                  Re-commander
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ─── Catalogue ──────────────────────────────────────────────────────────────
    const CATEGORIES_ORDER = [
      'Flacons 500 ml',
      'Recharges 5 litres',
      'Portes flacons',
      'Cadeaux VIP & Spa',
      'Produits Spa & VIP',
      'Parfums & gel hydroalcoolique',
      'Produits hygi\u00e8ne format voyage',
      'Produits hygi\u00e8ne format 30ml',
    ];

    const CatalogueView = ({ catalogue, panier, setPanier }) => {
      const [search, setSearch] = useState("");

      const filtered = useMemo(() => {
        if (!search) return catalogue;
        const q = search.toLowerCase();
        return catalogue.filter(p => p.ref.toLowerCase().includes(q) || p.nom.toLowerCase().includes(q));
      }, [catalogue, search]);

      const grouped = useMemo(() => {
        const groups = {};
        for (const p of filtered) {
          const cat = p.categorie || 'Autres';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(p);
        }
        // Trier selon CATEGORIES_ORDER, puis "Autres" à la fin
        const ordered = [];
        for (const cat of CATEGORIES_ORDER) {
          if (groups[cat]) ordered.push({ categorie: cat, products: groups[cat] });
        }
        // Catégories non listées + "Autres"
        for (const cat of Object.keys(groups)) {
          if (!CATEGORIES_ORDER.includes(cat)) ordered.push({ categorie: cat, products: groups[cat] });
        }
        return ordered;
      }, [filtered]);

      const getQty = (ref) => panier[ref]?.quantite || 0;
      const getCartons = (ref, moq) => { const q = getQty(ref); const m = moq || 1; return m > 1 ? Math.floor(q / m) : q; };

      const addCarton = (ref) => {
        const prod = catalogue.find(c => c.ref === ref);
        const moq = prod.moq || 1;
        const current = getQty(ref);
        setPanier(p => ({ ...p, [ref]: { ...prod, quantite: current + moq } }));
      };

      const removeCarton = (ref) => {
        const prod = catalogue.find(c => c.ref === ref);
        const moq = prod.moq || 1;
        const current = getQty(ref);
        const next = current - moq;
        if (next <= 0) {
          setPanier(p => { const n = { ...p }; delete n[ref]; return n; });
        } else {
          setPanier(p => ({ ...p, [ref]: { ...prod, quantite: next } }));
        }
      };

      const ProductCard = ({ p }) => {
        const moq = p.moq || 1;
        const qty = getQty(p.ref);
        const cartons = getCartons(p.ref, moq);
        return (
          <div className="bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/10 transition-colors">
            <div className="text-xs text-slate-400 font-mono mb-1">{p.ref}</div>
            <div className="text-sm font-medium text-white mb-3 leading-snug">{p.nom}</div>
            <div className="flex items-end justify-between">
              <div>
                {p.discount_pct > 0 && (
                  <div className="text-xs text-slate-500 line-through">{p.prix_ht.toFixed(2)} &euro; HT</div>
                )}
                <div className="text-lg font-semibold text-emerald-400">{p.prix_remise.toFixed(2)} &euro; <span className="text-xs font-normal text-slate-400">HT/u</span></div>
                {p.discount_pct > 0 && (
                  <div className="text-xs text-emerald-400/70">-{p.discount_pct}%</div>
                )}
                {moq > 1 && (
                  <div className="text-[10px] text-slate-400 mt-0.5">Carton de {moq} u.</div>
                )}
              </div>
              <div className="flex items-center gap-2">
                {qty > 0 && (
                  <button onClick={() => removeCarton(p.ref)} className="w-8 h-8 rounded-lg bg-white/10 text-white hover:bg-white/20 flex items-center justify-center text-lg font-bold transition-colors">-</button>
                )}
                {qty > 0 && (
                  <div className="text-center">
                    <div className="text-white font-semibold text-sm">{moq > 1 ? cartons : qty}</div>
                    {moq > 1 && <div className="text-[9px] text-slate-500">{qty} u.</div>}
                  </div>
                )}
                <button onClick={() => addCarton(p.ref)} className="w-8 h-8 rounded-lg bg-emerald-500 text-white hover:bg-emerald-400 flex items-center justify-center text-lg font-bold transition-colors">+</button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div>
          <div className="mb-6">
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Rechercher un produit..."
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-white/30"
            />
          </div>
          {grouped.map(({ categorie, products }) => (
            <div key={categorie} className="mb-8">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-5 bg-slate-500 rounded-full"></div>
                <h3 className="text-sm font-semibold text-white">{categorie}</h3>
                <span className="text-xs text-slate-500">{products.length} produit{products.length > 1 ? 's' : ''}</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {products.map(p => <ProductCard key={p.ref} p={p} />)}
              </div>
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="text-center py-12 text-slate-400 text-sm">Aucun produit trouv&eacute;</div>
          )}
        </div>
      );
    };

    // ─── Panier Panel ───────────────────────────────────────────────────────────
    const PanierPanel = ({ panier, setPanier, onCommander, loading, partner }) => {
      const [notes, setNotes] = useState("");
      const items = Object.values(panier);
      const subtotalHT = items.reduce((s, i) => s + i.prix_remise * i.quantite, 0);
      const francoSeuil = partner.franco_seuil ?? 800;
      const exonere = partner.frais_exonere ?? 0;
      const fpPrix = partner.fp_prix ?? 0;
      const fePrix = partner.fe_prix ?? 0;

      let fraisLabel = '';
      let fraisMontant = 0;
      let francoAtteint = subtotalHT >= francoSeuil;
      if (!exonere) {
        if (francoAtteint) {
          fraisLabel = 'Frais de pr\u00e9paration (FP)';
          fraisMontant = fpPrix;
        } else {
          fraisLabel = "Frais d'exp\u00e9dition (FE)";
          fraisMontant = fePrix;
        }
      }
      const totalHT = subtotalHT + fraisMontant;
      const totalTTC = totalHT * 1.2;
      const manquePourFranco = Math.max(0, francoSeuil - subtotalHT);

      if (items.length === 0) {
        return (
          <div className="text-center py-8 text-slate-400 text-sm">
            Votre panier est vide.<br />Ajoutez des produits depuis le catalogue.
          </div>
        );
      }

      return (
        <div className="space-y-4">
          {items.map(i => {
            const moq = i.moq || 1;
            const cartons = moq > 1 ? Math.floor(i.quantite / moq) : i.quantite;
            return (
              <div key={i.ref} className="bg-white/5 rounded-xl p-3">
                <div className="flex items-center justify-between">
                  <div className="min-w-0 flex-1">
                    <div className="text-xs text-slate-400 font-mono">{i.ref}</div>
                    <div className="text-sm text-white truncate">{i.nom}</div>
                    <div className="flex items-center gap-2 mt-0.5">
                      {i.discount_pct > 0 ? (
                        <>
                          <span className="text-xs text-slate-500 line-through">{i.prix_ht.toFixed(2)} &euro;</span>
                          <span className="text-xs text-emerald-400">{i.prix_remise.toFixed(2)} &euro; HT/u</span>
                          <span className="text-[10px] px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400 font-medium">-{i.discount_pct}%</span>
                        </>
                      ) : (
                        <span className="text-xs text-slate-400">{i.prix_remise.toFixed(2)} &euro; HT/u</span>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 ml-3">
                    <div className="flex items-center gap-1">
                      <button onClick={() => setPanier(p => {
                        const next = i.quantite - moq;
                        if (next <= 0) { const n = { ...p }; delete n[i.ref]; return n; }
                        return { ...p, [i.ref]: { ...i, quantite: next } };
                      })} className="w-6 h-6 rounded bg-white/10 text-white text-xs hover:bg-white/20 flex items-center justify-center">-</button>
                      <div className="text-center min-w-[32px]">
                        <div className="text-white text-sm font-semibold">{moq > 1 ? cartons : i.quantite}</div>
                        {moq > 1 && <div className="text-[9px] text-slate-500 leading-none">{i.quantite} u.</div>}
                      </div>
                      <button onClick={() => setPanier(p => ({ ...p, [i.ref]: { ...i, quantite: i.quantite + moq } }))} className="w-6 h-6 rounded bg-white/10 text-white text-xs hover:bg-white/20 flex items-center justify-center">+</button>
                    </div>
                    <div className="text-sm text-white font-medium w-20 text-right">{(i.prix_remise * i.quantite).toFixed(2)} &euro;</div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Barre de progression franco */}
          {!exonere && (
            <div className="bg-white/5 rounded-xl p-3">
              <div className="flex justify-between text-[11px] mb-1.5">
                <span className={francoAtteint ? "text-emerald-400" : "text-slate-400"}>
                  {francoAtteint ? 'Franco atteint !' : `Encore ${manquePourFranco.toFixed(2)} \u20ac pour le franco`}
                </span>
                <span className="text-slate-500">{subtotalHT.toFixed(0)} / {francoSeuil.toFixed(0)} &euro; HT</span>
              </div>
              <div className="w-full bg-white/10 rounded-full h-1.5">
                <div
                  className={`h-1.5 rounded-full transition-all ${francoAtteint ? 'bg-emerald-500' : 'bg-amber-500'}`}
                  style={{ width: `${Math.min(100, (subtotalHT / francoSeuil) * 100)}%` }}
                />
              </div>
              <div className="text-[10px] mt-1 text-slate-500">
                {francoAtteint
                  ? `Frais de pr\u00e9paration : ${fpPrix.toFixed(2)} \u20ac HT (au lieu de ${fePrix.toFixed(2)} \u20ac d'exp\u00e9dition)`
                  : `Frais d'exp\u00e9dition : ${fePrix.toFixed(2)} \u20ac HT`
                }
              </div>
            </div>
          )}

          <div className="border-t border-white/10 pt-4 space-y-2">
            <div className="flex justify-between text-sm text-slate-300">
              <span>Sous-total HT</span>
              <span>{subtotalHT.toFixed(2)} &euro;</span>
            </div>
            {!exonere && (
              <div className={`flex justify-between text-sm ${francoAtteint ? 'text-emerald-400' : 'text-amber-400'}`}>
                <span>{fraisLabel}</span>
                <span>{fraisMontant.toFixed(2)} &euro;</span>
              </div>
            )}
            {exonere === 1 && (
              <div className="flex justify-between text-sm text-emerald-400">
                <span>Frais</span>
                <span>Exon&eacute;r&eacute;</span>
              </div>
            )}
            <div className="flex justify-between text-sm text-white font-semibold">
              <span>Total HT</span>
              <span>{totalHT.toFixed(2)} &euro;</span>
            </div>
            <div className="flex justify-between text-sm text-slate-400">
              <span>Total TTC (20%)</span>
              <span>{totalTTC.toFixed(2)} &euro;</span>
            </div>
          </div>
          <textarea
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="Notes ou instructions (optionnel)..."
            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-white/20 resize-none"
            rows={3}
          />
          <button
            onClick={() => onCommander(notes)}
            disabled={loading}
            className="w-full bg-emerald-500 text-white py-3 rounded-xl text-sm font-semibold hover:bg-emerald-400 transition-colors disabled:opacity-50"
          >
            {loading ? "Envoi en cours..." : `Commander (${totalHT.toFixed(2)} \u20ac HT)`}
          </button>
        </div>
      );
    };

    // ─── Historique ─────────────────────────────────────────────────────────────
    const HistoriqueView = ({ commandes, onRefresh, catalogue, setPanier, setPanierOpen, setVue, showToast }) => {
      const [deleting, setDeleting] = useState(null);
      const statutConfig = {
        en_attente: { label: "En attente", bg: "bg-amber-500/20", text: "text-amber-400" },
        validee: { label: "Valid\u00e9e", bg: "bg-emerald-500/20", text: "text-emerald-400" },
        annulee: { label: "Annul\u00e9e", bg: "bg-red-500/20", text: "text-red-400" },
      };

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette commande ?')) return;
        setDeleting(id);
        try {
          const res = await api.del(`/commande/${id}`);
          if (res.erreur) { showToast(res.erreur, 'error'); }
          else { showToast('Commande supprim\u00e9e', 'success'); onRefresh(); }
        } catch (e) { showToast('Erreur suppression', 'error'); }
        setDeleting(null);
      };

      const handleModify = async (c) => {
        // Supprimer d'abord l'ancienne commande
        try {
          const delRes = await api.del(`/commande/${c.id}`);
          if (delRes.erreur) {
            showToast(delRes.erreur, 'error');
            return;
          }
        } catch (e) {
          showToast('Erreur suppression commande', 'error');
          return;
        }
        // Charger les produits de la commande dans le panier
        const newPanier = {};
        c.products.forEach(p => {
          const prod = catalogue.find(cat => cat.ref === p.ref);
          if (prod) {
            newPanier[p.ref] = { ...prod, quantite: p.quantite };
          } else {
            // Produit plus au catalogue, utiliser les données de la commande
            newPanier[p.ref] = { ref: p.ref, nom: p.nom, prix_ht: p.prix_ht, prix_remise: p.prix_remise, discount_pct: p.discount_pct || 0, moq: 1, quantite: p.quantite };
          }
        });
        setPanier(newPanier);
        setPanierOpen(true);
        setVue('catalogue');
        onRefresh();
        showToast('Commande charg\u00e9e dans le panier', 'success');
      };

      if (commandes.length === 0) {
        return <div className="text-center py-12 text-slate-400 text-sm">Aucune commande pass\u00e9e.</div>;
      }

      return (
        <div className="space-y-4">
          {commandes.map(c => {
            const cfg = statutConfig[c.statut] || statutConfig.en_attente;
            return (
              <div key={c.id} className="bg-white/5 border border-white/10 rounded-2xl p-5">
                <div className="flex items-center justify-between mb-3">
                  <div className="text-xs text-slate-400">{new Date(c.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                  <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${cfg.bg} ${cfg.text}`}>{cfg.label}</span>
                </div>
                <div className="space-y-1 mb-3">
                  {c.products.map((p, i) => (
                    <div key={i} className="flex justify-between text-sm">
                      <span className="text-slate-300">
                        {p.quantite}x {p.nom}
                        {p.discount_pct > 0 && <span className="text-emerald-400/70 ml-1 text-xs">(-{p.discount_pct}%)</span>}
                      </span>
                      <span className="text-white">{p.total_ht.toFixed(2)} &euro;</span>
                    </div>
                  ))}
                </div>
                <div className="flex justify-between text-sm font-medium border-t border-white/10 pt-2">
                  <span className="text-white">Total HT</span>
                  <span className="text-white">{c.total_ht.toFixed(2)} &euro;</span>
                </div>
                {c.vf_invoice_number && (
                  <div className="text-xs text-emerald-400 mt-2">Facture n&deg;{c.vf_invoice_number}</div>
                )}
                {c.notes && <div className="text-xs text-slate-400 mt-2 italic">"{c.notes}"</div>}
                {c.statut === 'en_attente' && (
                  <div className="flex gap-2 mt-3 pt-2 border-t border-white/5">
                    <button onClick={() => handleModify(c)} className="text-xs px-3 py-1.5 rounded-lg bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 transition-colors">
                      Modifier
                    </button>
                    <button onClick={() => handleDelete(c.id)} disabled={deleting === c.id} className="text-xs px-3 py-1.5 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-colors disabled:opacity-50">
                      {deleting === c.id ? 'Suppression...' : 'Supprimer'}
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    };

    // ─── App Principale ─────────────────────────────────────────────────────────
    const App = () => {
      const [partner, setPartner] = useState(null);
      const [vue, setVue] = useState("catalogue"); // catalogue | historique
      const [catalogue, setCatalogue] = useState([]);
      const [panier, setPanier] = useState({});
      const [commandes, setCommandes] = useState([]);
      const [panierOpen, setPanierOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const [orderSuccess, setOrderSuccess] = useState(false);
      const [toast, setToast] = useState(null);
      const [amenities, setAmenities] = useState(null);

      const showToast = (message, type = "info") => {
        setToast({ message, type, visible: true });
        setTimeout(() => setToast(t => t ? { ...t, visible: false } : null), 4000);
      };

      // Check existing session
      useEffect(() => {
        const token = sessionStorage.getItem('partner_token');
        if (token) {
          api.get('/profil').then(res => {
            if (res.erreur) {
              sessionStorage.removeItem('partner_token');
            } else {
              setPartner(res);
              try { setAmenities(res.amenities ? JSON.parse(res.amenities) : null); } catch (e) { setAmenities(null); }
            }
          }).catch(() => sessionStorage.removeItem('partner_token'));
        }
      }, []);

      // Load catalogue and orders
      useEffect(() => {
        if (!partner) return;
        api.get('/catalogue').then(data => { if (Array.isArray(data)) setCatalogue(data); });
        api.get('/commandes').then(data => { if (Array.isArray(data)) setCommandes(data); });
      }, [partner]);

      const handleLogin = (p) => {
        setPartner(p);
        try { setAmenities(p.amenities ? JSON.parse(p.amenities) : null); } catch (e) { setAmenities(null); }
      };

      const refreshCommandes = () => {
        api.get('/commandes').then(data => { if (Array.isArray(data)) setCommandes(data); });
      };

      const handleCommander = async (notes) => {
        const items = Object.values(panier);
        if (items.length === 0) return;
        setLoading(true);
        try {
          const res = await api.post('/commande', {
            products: items.map(i => ({ ref: i.ref, quantite: i.quantite })),
            notes: notes || undefined,
          });
          if (res.erreur) {
            showToast(res.erreur, "error");
          } else {
            setPanier({});
            setPanierOpen(false);
            showToast('Commande enregistr\u00e9e !', 'success');
            refreshCommandes();
            setVue('historique');
          }
        } catch (e) {
          showToast("Erreur lors de la commande", "error");
        }
        setLoading(false);
      };

      const handleLogout = () => {
        sessionStorage.removeItem('partner_token');
        setPartner(null);
        setCatalogue([]);
        setPanier({});
        setCommandes([]);
      };

      const panierCount = Object.values(panier).reduce((s, i) => s + i.quantite, 0);

      if (!partner) return <LoginScreen onLogin={handleLogin} />;

      return (
        <div className="min-h-screen bg-slate-900 text-white">
          <Toast toast={toast} />

          {/* Header */}
          <header className="sticky top-0 z-30 bg-slate-900/95 backdrop-blur border-b border-white/10">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-slate-900 text-xs font-bold">TM</div>
                <div className="hidden sm:block">
                  <div className="text-sm font-semibold">Terre de Mars</div>
                  <div className="text-xs text-slate-400">{partner.nom || partner.contact_nom}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => { setVue("catalogue"); setPanierOpen(false); setOrderSuccess(false); }} className={`px-3 py-2 rounded-lg text-sm transition-colors ${vue === "catalogue" && !panierOpen ? "bg-white/10 text-white" : "text-slate-400 hover:text-white"}`}>
                  Catalogue
                </button>
                <button onClick={() => { setVue("historique"); setPanierOpen(false); setOrderSuccess(false); }} className={`px-3 py-2 rounded-lg text-sm transition-colors ${vue === "historique" ? "bg-white/10 text-white" : "text-slate-400 hover:text-white"}`}>
                  Commandes
                </button>
                <button onClick={() => { setPanierOpen(!panierOpen); setVue("catalogue"); }} className="relative px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white transition-colors ml-2">
                  <span className="text-lg">&#128722;</span>
                  {panierCount > 0 && (
                    <span className="absolute -top-1 -right-1 bg-emerald-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">{panierCount}</span>
                  )}
                </button>
                <button onClick={handleLogout} className="text-slate-500 hover:text-slate-300 text-xs ml-2" title="D&eacute;connexion">
                  &#x2192;
                </button>
              </div>
            </div>
          </header>

          {/* Order success banner */}
          {orderSuccess && (
            <div className="bg-emerald-500/10 border-b border-emerald-500/20 animate-fade-in">
              <div className="max-w-6xl mx-auto px-4 py-4 text-center">
                <div className="text-emerald-400 font-semibold mb-1">Commande enregistr&eacute;e !</div>
                <div className="text-sm text-slate-300">Nous vous recontactons sous 24h pour confirmer votre commande.</div>
              </div>
            </div>
          )}

          {/* Main content */}
          <main className="max-w-6xl mx-auto px-4 py-6">
            {panierOpen ? (
              <div className="max-w-lg mx-auto animate-fade-in">
                <h2 className="text-lg font-semibold mb-4">Votre panier</h2>
                <PanierPanel panier={panier} setPanier={setPanier} onCommander={handleCommander} loading={loading} partner={partner} />
              </div>
            ) : vue === "catalogue" ? (
              <div className="animate-fade-in">
                <AmenitiesSection amenities={amenities} catalogue={catalogue} panier={panier} setPanier={setPanier} />
                <DerniereCommandeSection commandes={commandes} catalogue={catalogue} setPanier={setPanier} setPanierOpen={setPanierOpen} showToast={showToast} />
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-semibold">Catalogue</h2>
                  <span className="text-xs text-slate-400">{catalogue.length} produit{catalogue.length > 1 ? 's' : ''}</span>
                </div>
                <CatalogueView catalogue={catalogue} panier={panier} setPanier={setPanier} />
              </div>
            ) : (
              <div className="max-w-2xl mx-auto animate-fade-in">
                <h2 className="text-lg font-semibold mb-4">Historique des commandes</h2>
                <HistoriqueView commandes={commandes} onRefresh={refreshCommandes} catalogue={catalogue} setPanier={setPanier} setPanierOpen={setPanierOpen} setVue={setVue} showToast={showToast} />
              </div>
            )}
          </main>

          {/* Floating cart button (mobile) */}
          {panierCount > 0 && !panierOpen && vue === "catalogue" && (
            <button
              onClick={() => setPanierOpen(true)}
              className="md:hidden fixed bottom-6 right-6 bg-emerald-500 text-white px-5 py-3 rounded-2xl shadow-lg text-sm font-semibold flex items-center gap-2 z-20"
            >
              <span>&#128722;</span>
              Panier ({panierCount})
            </button>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
